<!--ユーザのログインページ -->
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <link href="login.css" rel="stylesheet" />
    <meta name="viewport" content="width=device-width" />
    <title>PawLovers_login</title>
  </head>

  <body>
    <img src="pawlovers-side.jpg" alt="pawlovers logo" id="pawlovers-img" />

    <form class="login" action="./main.html">
        <p>&nbsp;</p>             
        <label id="item" for="email">メールアドレス</label>
        <input type="text" placeholder="メールアドレスを入力してください" name="name" />
        <label id="item" for="pasword">パスワード</label>
        <input type="password" id="login" placeholder="パスワードを入力してください" name="pasword"/>
        <button type="submit">ログイン</button>
    </form>

    <form class="login" action="./terms.html">
        <p>・・・・・・・・・・・・・・・・初めての方はこちら・・・・・・・・・・・・・・・・</p>
        <button type="submit">新規会員登録</button>
        <p>&nbsp;</p> 
    </form>

  </body>

</html>
